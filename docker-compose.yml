version: '3.9'

services:
    postgres:
        image: ankane/pgvector:latest
        container_name: facerec-postgres
        environment:
            POSTGRES_DB: facerec
            POSTGRES_USER: facerec_user
            POSTGRES_PASSWORD: facerec_pass
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
            - ./src/main/resources/db/migration/V1__init_schema.sql:/docker-entrypoint-initdb.d/init.sql

    redis:
        image: redis:7-alpine
        container_name: facerec-redis
        ports:
            - "6379:6379"
        command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

    zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        environment:
            ZOOKEEPER_CLIENT_PORT: 2181
        ports:
            - "2181:2181"

    kafka:
        image: confluentinc/cp-kafka:7.5.0
        container_name: facerec-kafka
        depends_on:
            - zookeeper
        environment:
            KAFKA_BROKER_ID: 1
            KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
        ports:
            - "9092:9092"

volumes:
    pgdata: